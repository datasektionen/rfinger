<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>rfinger</title>
        <link href="css/style.css" rel="stylesheet">
        <link
            rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
        >
    </head>
    <body>
        <main class="container">
            <article style="display: flex; flex-direction: column; align-items: center;">
                <section style="display: flex; flex-direction: column; align-items: center;">
                    <h1>Din bild</h1>
                    <img src="/me?quality=true" style="max-height: 50vh; width: auto; border-radius: 10px;" alt="Your profile picture" />
                </section>
                <section style="display: flex; flex-direction: column; align-items: center;">
                    <h2>Profilbild</h2>
                    <div>
                        <img src="/me" style="height: 200px; width: 200px; object-fit: cover; clip-path: circle(50%);" alt="Your profile picture" />
                        <img src="/me" style="height: 100px; width: 100px; object-fit: cover; clip-path: circle(50%);" alt="Your profile picture" />
                        <img src="/me" style="height: 50px; width: 50px; object-fit: cover; clip-path: circle(50%);" alt="Your profile picture" />
                    </div>
                </section>
                <form id="uploadForm" method="post" enctype="multipart/form-data" style="width: 50%;" action="/me">
                    <fieldset class="grid">
                        <input type="file" name="image" value="profile picture" accept="image/*">
                        <button type="submit" name="submit" value="Upload" id="uploadButton" onclick="this.setAttribute('aria-busy','true')">Upload</button>
                    </fieldset>
                </form>
            </article>
        </main>
    </body>
</html>
